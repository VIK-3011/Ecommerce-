<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title>Order Placed - ShopEase</title>
    <script>(function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="success-wrapper">
    <div class="success-card">
        <div class="success-icon">✓</div>
        <h2>Order Placed Successfully!</h2>
        <p>Order ID: <strong th:text="'#' + ${order.id}">1</strong></p>
        <p>Total: <strong th:text="'₹' + ${#numbers.formatInteger(order.totalAmount, 1, 'COMMA')}">₹0</strong></p>
        <p class="success-address" th:text="'Delivering to: ' + ${order.address}">Address</p>
        <div class="success-actions">
            <a href="/orders" class="btn-primary">View Orders</a>
            <a href="/shop" class="btn-secondary">Continue Shopping</a>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="footer-inner">
        <div class="footer-brand">Shop<span>Ease</span></div>
        <div class="footer-links">
            <a href="/home">Home</a>
            <a href="/shop">Shop</a>
            <a href="/orders">Orders</a>
            <a href="/profile">Profile</a>
        </div>
        <div class="footer-copy">© 2026 ShopEase. All rights reserved.</div>
    </div>
</footer>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        const icon = document.getElementById('theme-icon');
        if (icon) icon.textContent = next === 'dark' ? '☀️' : '🌙';
    }
    const icon = document.getElementById('theme-icon');
    const current = localStorage.getItem('theme') || 'dark';
    if (icon) icon.textContent = current === 'dark' ? '☀️' : '🌙';
</script>
</body>
</html>
