<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title>My Orders - ShopEase</title>
    <script>(function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="orders-wrapper">
    <h2 class="page-title">My Orders</h2>

    <div th:if="${orders.isEmpty()}" class="empty-cart">
        <div class="empty-cart-icon">📦</div>
        <p>No orders yet.</p>
        <a href="/shop" class="btn-primary">Start Shopping</a>
    </div>

    <div th:each="order : ${orders}" class="order-card">
        <div class="order-header">
            <span class="order-id" th:text="'Order #' + ${order.id}">Order #1</span>
            <span class="order-status" th:text="${order.status}">PLACED</span>
            <span class="order-date" th:text="${#temporals.format(order.placedAt, 'dd MMM yyyy')}">Date</span>
        </div>
        <div class="order-items-preview">
            <span th:each="item, i : ${order.items}" th:if="${i.index < 3}">
                <span th:text="${item.product.name}">Item</span>
                <span th:if="${!i.last and i.index < 2}">, </span>
            </span>
            <span th:if="${order.items.size() > 3}"
                  th:text="' +' + (${order.items.size()} - 3) + ' more'"></span>
        </div>
        <div class="order-footer">
            <span class="order-total" th:text="'₹' + ${#numbers.formatInteger(order.totalAmount, 1, 'COMMA')}">₹0</span>
            <a th:href="@{/orders/{id}(id=${order.id})}" class="btn-secondary">View Details</a>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="footer-inner">
        <div class="footer-brand">Shop<span>Ease</span></div>
        <div class="footer-links">
            <a href="/home">Home</a>
            <a href="/shop">Shop</a>
            <a href="/orders">Orders</a>
            <a href="/profile">Profile</a>
        </div>
        <div class="footer-copy">© 2026 ShopEase. All rights reserved.</div>
    </div>
</footer>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        const icon = document.getElementById('theme-icon');
        if (icon) icon.textContent = next === 'dark' ? '☀️' : '🌙';
    }
    const icon = document.getElementById('theme-icon');
    const current = localStorage.getItem('theme') || 'dark';
    if (icon) icon.textContent = current === 'dark' ? '☀️' : '🌙';
</script>
</body>
</html>
