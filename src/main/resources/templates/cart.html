<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title>Cart - ShopEase</title>
    <script>(function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="cart-wrapper">
    <h2 class="page-title">Your Cart</h2>

    <div th:if="${cart.items.isEmpty()}" class="empty-cart">
        <div class="empty-cart-icon">🛒</div>
        <p>Your cart is empty.</p>
        <a href="/shop" class="btn-primary">Continue Shopping</a>
    </div>

    <div th:if="${!cart.items.isEmpty()}">
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart.items}">
                    <td>
                        <div class="cart-product">
                            <img th:src="${item.product.imageUrl}"
                                 th:alt="${item.product.name}"
                                 loading="lazy"
                                 onerror="this.style.display='none'">
                            <div>
                                <div class="cart-product-name" th:text="${item.product.name}">Name</div>
                                <div class="cart-product-cat" th:text="${item.product.category.name}">Cat</div>
                            </div>
                        </div>
                    </td>
                    <td class="cart-price" th:text="'₹' + ${#numbers.formatInteger(item.product.price, 1, 'COMMA')}">₹0</td>
                    <td>
                        <form th:action="@{/cart/update}" method="post" class="qty-form">
                            <input type="hidden" name="itemId" th:value="${item.id}">
                            <input type="number" name="quantity" th:value="${item.quantity}"
                                   min="1" max="99" onchange="this.form.submit()">
                        </form>
                    </td>
                    <td class="cart-subtotal" th:text="'₹' + ${#numbers.formatInteger(item.product.price * item.quantity, 1, 'COMMA')}">₹0</td>
                    <td>
                        <form th:action="@{/cart/remove}" method="post">
                            <input type="hidden" name="itemId" th:value="${item.id}">
                            <button type="submit" class="btn-remove">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="cart-footer">
            <div>
                <div class="cart-total-label">Total amount</div>
                <div class="cart-total" th:text="'₹' + ${#numbers.formatInteger(cart.total, 1, 'COMMA')}">₹0</div>
            </div>
            <div class="cart-actions">
                <a href="/shop" class="btn-secondary">Continue Shopping</a>
                <a href="/checkout" class="btn-primary">Proceed to Checkout</a>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="footer-inner">
        <div class="footer-brand">Shop<span>Ease</span></div>
        <div class="footer-links">
            <a href="/home">Home</a>
            <a href="/shop">Shop</a>
            <a href="/orders">Orders</a>
            <a href="/profile">Profile</a>
        </div>
        <div class="footer-copy">© 2026 ShopEase. All rights reserved.</div>
    </div>
</footer>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        const icon = document.getElementById('theme-icon');
        if (icon) icon.textContent = next === 'dark' ? '☀️' : '🌙';
    }
    const icon = document.getElementById('theme-icon');
    const current = localStorage.getItem('theme') || 'dark';
    if (icon) icon.textContent = current === 'dark' ? '☀️' : '🌙';
</script>
</body>
</html>
