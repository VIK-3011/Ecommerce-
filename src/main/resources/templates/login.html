<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title>Login — ShopEase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg:      #080C14;
            --bg2:     #0F1621;
            --surface: #1C2538;
            --border:  #2A3550;
            --accent:  #4F8EF7;
            --accent2: #7AAEFF;
            --accent-glow: rgba(79,142,247,0.15);
            --text:    #E8ECF4;
            --text2:   #8A97B0;
            --text3:   #556078;
            --red:     #F05454;
            --input-bg: #161D2B;
        }
        :root[data-theme="light"] {
            --bg:      #F4F6FB;
            --bg2:     #FFFFFF;
            --surface: #EEF1F8;
            --border:  #D8DEF0;
            --accent:  #3B7EF6;
            --accent2: #5B96F7;
            --accent-glow: rgba(59,126,246,0.1);
            --text:    #111827;
            --text2:   #4B5563;
            --text3:   #9CA3AF;
            --red:     #EF4444;
            --input-bg: #FFFFFF;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 48px;
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
        }
        .brand {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
        }
        .brand span { color: var(--accent); }

        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

        /* Main layout */
        .auth-layout {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            position: relative;
            overflow: hidden;
        }
        .auth-layout::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 30% 40%, rgba(79,142,247,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 70% 70%, rgba(122,94,248,0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .auth-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            box-shadow: 0 8px 48px rgba(0,0,0,0.15);
        }

        .auth-card h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .auth-subtitle {
            font-size: 0.88rem;
            color: var(--text2);
            margin-bottom: 32px;
            font-weight: 300;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text3);
            margin-bottom: 7px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input::placeholder { color: var(--text3); }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .btn-submit:hover {
            background: var(--accent2);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79,142,247,0.3);
        }
        .btn-submit:active { transform: translateY(0); }

        .auth-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 0.87rem;
            color: var(--text2);
        }
        .auth-footer a { color: var(--accent); font-weight: 500; }
        .auth-footer a:hover { color: var(--accent2); }

        .error-msg {
            background: rgba(240,84,84,0.1);
            color: var(--red);
            border: 1px solid rgba(240,84,84,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .error-msg::before { content: '⚠'; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
            color: var(--text3);
            font-size: 0.78rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        footer {
            background: var(--bg2);
            border-top: 1px solid var(--border);
        }
        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 48px;
        }
        .footer-brand {
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
        }
        .footer-brand span { color: var(--accent); }
        .footer-copy { font-size: 0.78rem; color: var(--text3); }
        .footer-links { display: flex; gap: 20px; }
        .footer-links a { font-size: 0.8rem; color: var(--text3); text-decoration: none; }
        .footer-links a:hover { color: var(--text2); }
    </style>
</head>
<body>

<div class="topbar">
    <a href="/" class="brand">Shop<span>Ease</span></a>
    <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">☀️</span>
        <span id="theme-label">Light mode</span>
    </button>
</div>

<div class="auth-layout">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Sign in to your ShopEase account</p>

        <div class="error-msg" th:if="${error}" th:text="${error}"></div>

        <form action="/login" method="post">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-submit">Sign in →</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one free</a>
        </div>
    </div>
</div>


<script>
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
        document.getElementById('theme-label').textContent = isDark ? 'Dark mode' : 'Light mode';
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    // Remember preference
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    if (saved === 'light') {
        document.getElementById('theme-icon').textContent = '🌙';
        document.getElementById('theme-label').textContent = 'Dark mode';
    }
</script>
</body>
</html>
