<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title th:text="${product.name} + ' - ShopEase'">Product - ShopEase</title>
    <script>(function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="detail-wrapper">
    <div class="detail-image">
        <img th:src="${product.imageUrl}"
             th:alt="${product.name}"
             loading="lazy"
             decoding="async"
             onerror="this.style.display='none'">
    </div>
    <div class="detail-info">
        <p class="category-tag" th:text="${product.category.name}">Category</p>
        <h1 th:text="${product.name}">Product Name</h1>
        <p class="detail-desc" th:text="${product.description}">Description</p>
        <div class="detail-divider"></div>
        <p class="detail-price"><span th:text="'₹' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}">₹0</span></p>
        <p class="stock-info" th:text="${product.stock} + ' in stock'">Stock</p>

        <form th:action="@{/cart/add}" method="post">
            <input type="hidden" name="productId" th:value="${product.id}">
            <div class="qty-row">
                <label>Qty:</label>
                <input type="number" name="quantity" value="1" min="1" th:max="${product.stock}">
            </div>
            <button type="submit" class="btn-primary btn-large">Add to Cart</button>
        </form>

        <a href="/shop" class="btn-secondary" style="margin-top:8px">← Back to Shop</a>
    </div>
</div>

<footer class="footer">
    <div class="footer-inner">
        <div class="footer-brand">Shop<span>Ease</span></div>
        <div class="footer-links">
            <a href="/home">Home</a>
            <a href="/shop">Shop</a>
            <a href="/orders">Orders</a>
            <a href="/profile">Profile</a>
        </div>
        <div class="footer-copy">© 2026 ShopEase. All rights reserved.</div>
    </div>
</footer>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        const icon = document.getElementById('theme-icon');
        if (icon) icon.textContent = next === 'dark' ? '☀️' : '🌙';
    }
    const icon = document.getElementById('theme-icon');
    const current = localStorage.getItem('theme') || 'dark';
    if (icon) icon.textContent = current === 'dark' ? '☀️' : '🌙';
</script>
</body>
</html>
