<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title>Order Detail - ShopEase</title>
    <script>(function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="orders-wrapper">
    <a href="/orders" class="btn-secondary" style="margin-bottom:20px;display:inline-block">← Back to Orders</a>
    <h2 class="page-title" th:text="'Order #' + ${order.id}">Order</h2>

    <div class="order-card">
        <div class="order-header">
            <span class="order-status" th:text="${order.status}">PLACED</span>
            <span class="order-date"
                  th:text="${#temporals.format(order.placedAt, 'dd MMM yyyy, HH:mm')}">Date</span>
        </div>

        <table class="cart-table" style="margin-top:16px">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Unit Price</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.product.name}">Product</td>
                    <td th:text="${item.quantity}">1</td>
                    <td th:text="'₹' + ${#numbers.formatInteger(item.price, 1, 'COMMA')}">₹0</td>
                    <td th:text="'₹' + ${#numbers.formatInteger(item.price * item.quantity, 1, 'COMMA')}">₹0</td>
                </tr>
            </tbody>
        </table>

        <div class="order-footer" style="margin-top:20px">
            <div>
                <p style="color:var(--text3);font-size:0.85rem;margin-bottom:4px">Delivering to:</p>
                <p th:text="${order.address}">Address</p>
            </div>
            <span class="order-total" th:text="'Total: ₹' + ${#numbers.formatInteger(order.totalAmount, 1, 'COMMA')}">₹0</span>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="footer-inner">
        <div class="footer-brand">Shop<span>Ease</span></div>
        <div class="footer-links">
            <a href="/home">Home</a>
            <a href="/shop">Shop</a>
            <a href="/orders">Orders</a>
            <a href="/profile">Profile</a>
        </div>
        <div class="footer-copy">© 2026 ShopEase. All rights reserved.</div>
    </div>
</footer>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        const icon = document.getElementById('theme-icon');
        if (icon) icon.textContent = next === 'dark' ? '☀️' : '🌙';
    }
    const icon = document.getElementById('theme-icon');
    const current = localStorage.getItem('theme') || 'dark';
    if (icon) icon.textContent = current === 'dark' ? '☀️' : '🌙';
</script>
</body>
</html>
