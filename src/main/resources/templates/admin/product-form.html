<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title>Product Form — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #080C14; --bg2: #0F1621; --surface: #1C2538;
            --border: #2A3550; --accent: #4F8EF7; --accent-glow: rgba(79,142,247,0.15);
            --text: #E8ECF4; --text2: #8A97B0; --text3: #556078; --input-bg: #161D2B;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 40px; background: var(--bg2); border-bottom: 1px solid var(--border);
        }
        .brand { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--text); text-decoration: none; }
        .brand span { color: var(--accent); }
        .main { max-width: 640px; margin: 0 auto; padding: 40px 24px; }
        .page-header { margin-bottom: 28px; }
        .page-header h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; }
        .back { font-size: 0.85rem; color: var(--text3); text-decoration: none; margin-bottom: 12px; display: inline-block; }
        .back:hover { color: var(--text2); }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 16px; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-group select option { background: var(--bg2); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-submit {
            width: 100%; padding: 13px; background: var(--accent); color: white;
            border: none; border-radius: 10px; font-family: 'Syne', sans-serif;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-top: 8px; border: 1px solid var(--border); display: none; }
    </style>
</head>
<body>
<div class="topbar">
    <a href="/admin/dashboard" class="brand">Shop<span>Ease</span> <span style="font-size:0.7rem;color:var(--text3);font-weight:400;margin-left:4px">Admin</span></a>
</div>
<div class="main">
    <a href="/admin/dashboard" class="back">← Back to dashboard</a>
    <div class="page-header">
        <h1 th:text="${product.id == null ? 'Add Product' : 'Edit Product'}">Product</h1>
    </div>
    <div class="card">
        <form action="/admin/products/save" method="post">
            <input type="hidden" name="id" th:value="${product.id}">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" th:value="${product.name}" placeholder="e.g. Nike Air Max" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" placeholder="Describe the product..." th:text="${product.description}"></textarea>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" name="price" th:value="${product.price}" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input type="number" name="stock" th:value="${product.stock}" placeholder="0" min="0" required>
                </div>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="categoryId" required>
                    <option value="">Select a category</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${product.category != null and product.category.id == cat.id}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="text" name="imageUrl" id="imageUrl" th:value="${product.imageUrl}"
                       placeholder="https://example.com/image.jpg"
                       oninput="previewImage(this.value)">
                <img id="img-preview" class="preview-img" alt="Preview">
            </div>
            <button type="submit" class="btn-submit" th:text="${product.id == null ? 'Add Product' : 'Save Changes'}">Save</button>
        </form>
    </div>
</div>
<script>
    function previewImage(url) {
        const img = document.getElementById('img-preview');
        if (url) { img.src = url; img.style.display = 'block'; }
        else { img.style.display = 'none'; }
    }
    window.onload = () => {
        const url = document.getElementById('imageUrl').value;
        if (url) previewImage(url);
    };
</script>
</body>
</html>
