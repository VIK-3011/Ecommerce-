<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <title>Admin Login — ShopEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #080C14; --bg2: #0F1621; --surface: #1C2538;
            --border: #2A3550; --accent: #E8533A; --accent2: #FF6B52;
            --accent-glow: rgba(232,83,58,0.15); --text: #E8ECF4;
            --text2: #8A97B0; --text3: #556078; --red: #F05454;
            --input-bg: #161D2B;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 48px; border-bottom: 1px solid var(--border);
            background: var(--bg2);
        }
        .brand { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--text); text-decoration: none; }
        .brand span { color: var(--accent); }
        .admin-badge {
            background: rgba(232,83,58,0.12); color: var(--accent);
            border: 1px solid rgba(232,83,58,0.3); border-radius: 6px;
            padding: 4px 10px; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px;
        }
        .auth-layout {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px;
        }
        .auth-card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 20px; padding: 44px 40px; width: 100%; max-width: 400px;
            box-shadow: 0 8px 48px rgba(0,0,0,0.3);
        }
        .shield { font-size: 2.5rem; margin-bottom: 12px; }
        .auth-card h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
        .auth-subtitle { font-size: 0.88rem; color: var(--text2); margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 0.78rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 7px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input::placeholder { color: var(--text3); }
        .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .btn-submit {
            width: 100%; padding: 13px; background: var(--accent); color: white;
            border: none; border-radius: 10px; font-family: 'Syne', sans-serif;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-submit:hover { background: var(--accent2); transform: translateY(-1px); }
        .error-msg {
            background: rgba(240,84,84,0.1); color: var(--red);
            border: 1px solid rgba(240,84,84,0.25); border-radius: 8px;
            padding: 10px 14px; font-size: 0.85rem; margin-bottom: 16px;
        }
        .back-link { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text3); }
        .back-link a { color: var(--text2); text-decoration: none; }
        .back-link a:hover { color: var(--text); }
    </style>
</head>
<body>
<div class="topbar">
    <a href="/" class="brand">Shop<span>Ease</span></a>
    <span class="admin-badge">ADMIN PORTAL</span>
</div>
<div class="auth-layout">
    <div class="auth-card">
        <div class="shield">🛡️</div>
        <h1>Admin Access</h1>
        <p class="auth-subtitle">Restricted area — authorized personnel only</p>
        <div class="error-msg" th:if="${error}" th:text="${error}"></div>
        <form action="/admin/login" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="admin@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Admin password" required>
            </div>
            <button type="submit" class="btn-submit">Enter Dashboard →</button>
        </form>
        <div class="back-link"><a href="/">← Back to store</a></div>
    </div>
</div>
</body>
</html>
